name: ont_vc
# --------------------------------------------------------------------------------
# Autor:   Pablo de la Calva Castineira
# Fecha:   05/05/2026
# Titulo:  "Analisis bioinformatico y su implementacion en la practica clinica
#           diaria de datos de NGS de lecturas largas mediante tecnologa Nanopore"
#
# Entorno conda para el pipeline de llamada de variantes de lecturas mtDNA de Nanopore 
# Orden del procesamiento:
#   verificar (modelos clair3) → clair3 (pileup/full → merge) → mutserve → 
#   bcftools merge → normalizar → comparacion → indexar → informe
#
# Crear entorno : conda env create -f ont_vc.yml
# Activar       : conda activate ont_vc
# Verificar     : conda env list
#
# NOTAS DE COMPATIBILIDAD:
#   - Clair3 v2.0.1 requiere Python 3.11 y PyTorch (NO)
#   - PyTorch se instala via pip DESPUES de crear el entorno (instalacion)
#   - Clair3 bioconda v2.0..1 incluye: whatshap, parallel, pypy3, longphase
#   - samtools y bcftools comparten HTSlib (misma version)
#   - samtools >= 1.10 requerido por Clair3 (v1.23, ultima version estable)
# INSTALACION:
#   1. Crear entorno:
#        conda env create -f ont_vc.yml
#   2. Activar:
#        conda activate ont_vc
#   3. Instalar PyTorch (CPU):
#        pip install uv
#        uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
#   4. Instalar dependencias Python (Clair3):
#        uv pip install numpy h5py hdf5plugin numexpr tqdm cffi torchmetrics
#   5. Descargar modelos PyTorch:
#       Modelos ONT: https://www.bio8.cs.hku.hk/clair3/clair3_models_rerio_pytorch/
#       5.1. Creacion directorio propio para los modelos: mkdir -p /home/.../clair3_models → cd clair3_models
#       5.2. Descargar modelo: 
#         wget https://www.bio8.cs.hku.hk/clair3/clair3_models_rerio_pytorch/r1041_e82_400bps_sup_v500/pileup.pt (rapido, deteccion inicial)
#         wget https://www.bio8.cs.hku.hk/clair3/clair3_models_rerio_pytorch/r1041_e82_400bps_sup_v500/full_alignment.pt (preciso, refinamiento)
#   6. Descargar Mutverse2 (version java no disponible para conda/pip)
#        6.1. Creacion directorio en el env de conda: mkdir -p /directorio_interes 
#        6.2. Descarga del programa en la carpeta 6.1.: curl -sL mutserve.vercel.app | bash
#        6.3. Permisos de ejecucion: chmod +x /directorio_interes/mutserve2 
#        6.4. Crear enlace simbolico para trabajar comodamente: ln -s /directorio_mutserver /directorio_conda
# -------------------------------------------------------------------------------------------------------------------------------
channels:
  - conda-forge
  - bioconda
  - defaults       
 
dependencies:
  - python=3.11          # Python v3.11 requerido por Clair3 v2.0.1 
  - clair3=2.0.1         # Incluye internamente: whatshap, parallel, pypy3, longphase, modelos
  - samtools=1.23        # samtools >= 1.10 requerido por Clair3 + Comparte HTSlib 1.23 con bcftools
  - bcftools=1.23        # Ultima version estable, HTSlib 1.23 sincronizado
  - openjdk=17           # Uso para Mutserve2
  
  # Herramientas de compilacion (necesarias para Clair3)
  - make
  - automake
  - gcc
  - gxx
  # Utilitarios de compresion y transferencia 
  - zstd             # compresion de intermedios de Clair3
  - pigz             # gzip paralelo para VCF.gz
  - curl             # descarga de modelos
# -------------------------------------------------------------------------------------------------------------------------------
  # PyTorch: instalacion OBLIGATORIA via pip despues del entorno → Ver instrucciones de instalacion (bloque superior)
# -------------------------------------------------------------------------------------------------------------------------------